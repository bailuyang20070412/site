<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Gradient Cube (Lab4)</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #1a1a2e;
        }

        .cube {
            position: relative;
            width: 200px;
            height: 200px;
            transform-style: preserve-3d;
            transform: rotateX(-30deg) rotateY(45deg);
        }

        .cube-face {
            position: absolute;
            width: 200px;
            height: 200px;
            border: 2px solid rgba(255,255,255,0.8);
            box-sizing: border-box;
        }

        .front {
            background: linear-gradient(135deg, #ff6b6b, #feca57);
            transform: translateZ(100px) skewX(0deg) skewY(0deg);
        }

        .back {
            background: linear-gradient(135deg, #48dbfb, #ff9ff3);
            transform: translateZ(-100px) rotateY(180deg);
        }

        .left {
            background: linear-gradient(135deg, #1dd1a1, #5f27cd);
            transform: translateX(-100px) rotateY(-90deg) skewY(45deg);
            transform-origin: right center;
        }

        .right {
            background: linear-gradient(135deg, #f368e0, #ff9f43);
            transform: translateX(100px) rotateY(90deg) skewY(-45deg);
            transform-origin: left center;
        }
        .top {
            background: linear-gradient(135deg, #00d2d3, #54a0ff);
            transform: translateY(-100px) rotateX(90deg) skewX(-45deg);
            transform-origin: center bottom;
        }

        .bottom {
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            transform: translateY(100px) rotateX(-90deg) skewX(45deg);
            transform-origin: center top;
        }
    </style>
</head>
<body>
    <div class="cube">
        <div class="cube-face front"></div>
        <div class="cube-face back"></div>
        <div class="cube-face left"></div>
        <div class="cube-face right"></div>
        <div class="cube-face top"></div>
        <div class="cube-face bottom"></div>
    </div>
</body>
</html>
